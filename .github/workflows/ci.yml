name: Go CI Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: "-buildvcs=false"

jobs:

  # ================================
  # 🔍 LINT JOB
  # ================================
  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install golangci-lint (latest)
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
          | sh -s -- -b $(go env GOPATH)/bin latest

      - name: Verify golangci-lint
        run: golangci-lint --version

      - name: Run lint
        run: golangci-lint run --timeout=5m


  # ================================
  # 🔐 SECURITY JOB
  # ================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install Gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run Gosec
        run: gosec ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...


  # ================================
  # 🧪 TEST JOB (WITH REDIS)
  # ================================
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint, security]

    # 🔥 Redis service (CRITICAL FIX)
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # 🔥 Wait until Redis is ready
      - name: Wait for Redis
        run: |
          for i in {1..15}; do
            nc -z localhost 6379 && echo "✅ Redis is ready" && exit 0
            echo "⏳ Waiting for Redis..."
            sleep 2
          done
          echo "❌ Redis failed to start"
          exit 1

      - name: Download dependencies
        run: go mod download

      - name: Make test script executable
        run: chmod +x scripts/test.sh

      - name: Run tests
        run: ./scripts/test.sh

      - name: Generate coverage HTML
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html


  # ================================
  # 🐳 BUILD JOB
  # ================================
  build:
    name: Build (Go + Docker)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Build Go binary
        run: go build -v ./cmd/api

      - name: Build Docker image
        run: |
          docker build \
            -f deployments/docker/Dockerfile \
            -t go-notification-system:latest .


  # ================================
  # 🚀 DEPLOY JOB (OPTIONAL)
  # ================================
  deploy:
    name: Deploy (optional)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy placeholder
        run: echo "Add deployment logic (Railway / AWS / GCP)"